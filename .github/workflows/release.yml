name: Release

on:
  push:
    tags:
      - "*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: bash build.sh

      - name: Rename artifact
        run: mv template.tar.gz template-${{ github.ref_name }}.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: template-${{ github.ref_name }}.tar.gz